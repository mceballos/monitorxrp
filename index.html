<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de XRP Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .contenedor {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 800px;
        }

        .cabecera {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #121212;
            background-color: #ffffff;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 1.5rem;
            margin: 0 0 10px 0;
        }

        .precio-vivo {
            font-size: 3rem;
            font-weight: bold;
            color: #4caf50;
            margin: 10px 0;
        }

        .tiempo {
            font-size: 0.85rem;
            color: #888;
        }

        /* Estilos para la inclinación de compra/venta */
        .sentimiento-mercado {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .sentimiento-titulo {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .barra-contenedor {
            display: flex;
            height: 15px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #333;
        }

        .barra-compra {
            background-color: #4caf50;
            /* Verde */
            height: 100%;
            transition: width 0.5s ease;
        }

        .barra-venta {
            background-color: #f44336;
            /* Rojo */
            height: 100%;
            transition: width 0.5s ease;
        }

        .sentimiento-etiquetas {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .etiqueta-compra {
            color: #4caf50;
        }

        .etiqueta-venta {
            color: #f44336;
        }

        .controles {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover,
        button.activo {
            background-color: #4caf50;
        }

        .metricas {
            display: flex;
            justify-content: space-around;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .metrica-item {
            text-align: center;
        }

        .metrica-item span {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .grafico-contenedor {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <div class="cabecera">
            <h1>XRP / USDT</h1>
            <div class="precio-vivo" id="precio-xrp">Cargando...</div>
            <div class="tiempo" id="ultima-actualizacion">Conectando al mercado...</div>
        </div>

        <div class="sentimiento-mercado">
            <div class="sentimiento-titulo">Inclinación del Libro de Órdenes (Tiempo Real)</div>
            <div class="barra-contenedor">
                <div class="barra-compra" id="barra-compra" style="width: 50%;"></div>
                <div class="barra-venta" id="barra-venta" style="width: 50%;"></div>
            </div>
            <div class="sentimiento-etiquetas">
                <div class="etiqueta-compra" id="texto-compra">Compras: 50%</div>
                <div class="etiqueta-venta" id="texto-venta">Ventas: 50%</div>
            </div>
        </div>

        <div class="metricas">
            <div class="metrica-item">
                <span>Máximo del periodo</span>
                <strong id="metrica-max">--</strong>
            </div>
            <div class="metrica-item">
                <span>Promedio</span>
                <strong id="metrica-prom">--</strong>
            </div>
            <div class="metrica-item">
                <span>Mínimo del periodo</span>
                <strong id="metrica-min">--</strong>
            </div>
        </div>

        <div class="controles">
            <button id="btn-12h" onclick="cargarHistorial(12)">Últimas 12 Horas</button>
            <button id="btn-24h" onclick="cargarHistorial(24)" class="activo">Últimas 24 Horas</button>
        </div>

        <div class="grafico-contenedor">
            <canvas id="graficoXRP"></canvas>
        </div>
    </div>

    <script>
        let grafico;

        // 1. OBTENER PRECIO EN VIVO
        async function obtenerPrecioLive() {
            try {
                const respuesta = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=XRPUSDT');
                const datos = await respuesta.json();
                const precio = parseFloat(datos.price).toFixed(4);

                document.getElementById('precio-xrp').textContent = `$${precio}`;

                const ahora = new Date();
                document.getElementById('ultima-actualizacion').textContent = `Última actualización: ${ahora.toLocaleTimeString()}`;
            } catch (error) {
                console.error("Error al obtener precio");
            }
        }

        // 2. OBTENER INCLINACIÓN DE COMPRA/VENTA (NUEVO)
        async function obtenerSentimientoMercado() {
            try {
                // Obtenemos las últimas 100 órdenes del libro (bids = compras, asks = ventas)
                const respuesta = await fetch('https://api.binance.com/api/v3/depth?symbol=XRPUSDT&limit=100');
                const datos = await respuesta.json();

                let volumenCompra = 0;
                let volumenVenta = 0;

                // Sumar volumen de dinero en intenciones de compra
                datos.bids.forEach(orden => {
                    const precio = parseFloat(orden[0]);
                    const cantidad = parseFloat(orden[1]);
                    volumenCompra += (precio * cantidad);
                });

                // Sumar volumen de dinero en intenciones de venta
                datos.asks.forEach(orden => {
                    const precio = parseFloat(orden[0]);
                    const cantidad = parseFloat(orden[1]);
                    volumenVenta += (precio * cantidad);
                });

                // Calcular porcentajes
                const volumenTotal = volumenCompra + volumenVenta;
                const porcentajeCompra = ((volumenCompra / volumenTotal) * 100).toFixed(1);
                const porcentajeVenta = ((volumenVenta / volumenTotal) * 100).toFixed(1);

                // Actualizar la interfaz (barra y textos)
                document.getElementById('barra-compra').style.width = `${porcentajeCompra}%`;
                document.getElementById('barra-venta').style.width = `${porcentajeVenta}%`;

                document.getElementById('texto-compra').textContent = `Fuerza Compradora: ${porcentajeCompra}%`;
                document.getElementById('texto-venta').textContent = `Presión Vendedora: ${porcentajeVenta}%`;

            } catch (error) {
                console.error("Error al obtener el sentimiento del mercado");
            }
        }

        // 3. CARGAR HISTORIAL Y GRÁFICO
        async function cargarHistorial(horas) {
            document.getElementById('btn-12h').classList.toggle('activo', horas === 12);
            document.getElementById('btn-24h').classList.toggle('activo', horas === 24);

            try {
                const respuesta = await fetch(`https://api.binance.com/api/v3/klines?symbol=XRPUSDT&interval=1h&limit=${horas}`);
                const datos = await respuesta.json();

                const etiquetas = [];
                const precios = [];
                let suma = 0;

                datos.forEach(vela => {
                    const fecha = new Date(vela[0]);
                    etiquetas.push(fecha.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                    const precioCierre = parseFloat(vela[4]);
                    precios.push(precioCierre);
                    suma += precioCierre;
                });

                const maximo = Math.max(...precios).toFixed(4);
                const minimo = Math.min(...precios).toFixed(4);
                const promedio = (suma / precios.length).toFixed(4);

                document.getElementById('metrica-max').textContent = `$${maximo}`;
                document.getElementById('metrica-min').textContent = `$${minimo}`;
                document.getElementById('metrica-prom').textContent = `$${promedio}`;

                dibujarGrafico(etiquetas, precios);

            } catch (error) {
                console.error("Error al cargar el historial");
            }
        }

        // 4. DIBUJAR CHART.JS
        function dibujarGrafico(etiquetas, precios) {
            const ctx = document.getElementById('graficoXRP').getContext('2d');
            if (grafico) { grafico.destroy(); }

            grafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        label: 'Precio USD',
                        data: precios,
                        borderColor: '#4caf50',
                        backgroundColor: 'rgba(76, 175, 80, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointRadius: 3,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                        y: {
                            grid: { color: '#333' },
                            ticks: { color: '#aaa' },
                            min: Math.min(...precios) * 0.98,
                            max: Math.max(...precios) * 1.02
                        }
                    }
                }
            });
        }

        // INICIALIZACIÓN DE TODAS LAS FUNCIONES
        function actualizarDatos() {
            obtenerPrecioLive();
            obtenerSentimientoMercado(); // Llamada a la nueva función
        }

        // Ejecutar inmediatamente
        actualizarDatos();
        cargarHistorial(24);

        // Actualizar precio y sentimiento de mercado cada 60 segundos
        setInterval(actualizarDatos, 60000);

    </script>
</body>

</html>
